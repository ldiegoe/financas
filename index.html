<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a84ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finanças" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="stylesheet" href="app.css" />
  <title>Finanças</title>
  <script>
    // Aplica o tema escolhido o mais cedo possível, antes do CSS pintar a tela,
    // para nao haver flash de cor errada quando o usuario forca claro/escuro.
    try {
      var raw = localStorage.getItem('financas:v1');
      var tema = raw ? (JSON.parse(raw).config || {}).tema : null;
      if (tema === 'light' || tema === 'dark') {
        document.documentElement.setAttribute('data-theme', tema);
      }
    } catch (e) {}
  </script>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <h1 id="title">Dashboard</h1>
      <div class="topbar-actions">
        <button id="toggle-values" class="icon-btn-ghost" aria-label="Ocultar valores">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
        <button id="quick-add" class="icon-btn" aria-label="Adicionar">+</button>
      </div>
    </header>
    <div class="profile-bar">
      <button id="profile-chip" class="profile-chip" aria-label="Trocar perfil">
        <span class="dot"></span>
        <span id="profile-name">Pessoal</span>
        <span class="caret">▾</span>
      </button>
    </div>

    <main id="view"></main>

    <nav class="tabbar">
      <a href="#/dashboard" data-tab="dashboard"><span class="ico">📊</span><span>Dashboard</span></a>
      <a href="#/carteira"  data-tab="carteira"><span class="ico">💰</span><span>Carteira</span></a>
      <a href="#/despesas"  data-tab="despesas"><span class="ico">💸</span><span>Despesas</span></a>
      <a href="#/categorias" data-tab="categorias"><span class="ico">🏷️</span><span>Categorias</span></a>
      <a href="#/config"    data-tab="config"><span class="ico">⚙️</span><span>Ajustes</span></a>
    </nav>

    <div id="modal-root"></div>
    <div id="toast"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script type="module" src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      // Se já tinha um SW controlando a página antes do registro, é um update —
      // quando o controlador trocar, recarrega para puxar os assets novos.
      const wasControlled = !!navigator.serviceWorker.controller;
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!wasControlled || refreshing) return;
        refreshing = true;
        window.location.reload();
      });
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
          // Quando o app volta para o primeiro plano (PWA fixada), checa update.
          document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') reg.update();
          });
          // Toda vez que detecta uma versão nova instalada, manda o SW assumir.
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', () => {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                nw.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });
        }).catch(() => {});
      });
    }
  </script>
</body>
</html>
